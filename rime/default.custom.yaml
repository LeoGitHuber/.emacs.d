patch:
  schema_list:
    - schema: wubi86_jidian
    # - schema: wubi86_super
    # - schema: wubi98_dz
    - schema: luna_pinyin_simp
    - schema: luna_pinyin
    - schema: pinyin_simp
  menu/page_size: 7
  switcher:
    abbreviate_options: true
    caption: "〔方案選單〕"
    fold_options: true
    hotkeys:
        - "Control+grave"
        - "Control+Shift+grave"
        - F4
    option_list_separator: "／"
    save_options:
        - full_shape
        - ascii_punct
        - simplification
        - extended_charset
        - zh_hant
        - zh_hans
        - zh_hant_tw
